<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>
  <h1 id="page-title">Topic Exploration</h1>
  <div class="sub" id="page-subtitle"></div>
  <button id="open-prompt-btn">New Topic</button>
  <button id="open-learning-prompt-btn">Learning Activity Prompt</button>
</header>

<div class="main">

  <section class="cluster-panel">
    <div class="panel-header">
      <div class="panel-kicker">Clusters</div>
      <div class="panel-title">Topic Structure</div>
      <div class="panel-subtitle">Choose a cluster to narrow the topic into a more manageable area.</div>
    </div>
    <div class="cluster-list" id="cluster-list"></div>
  </section>

  <section class="nodes-panel">
    <div class="panel-header" id="nodes-header"></div>
    <div class="nodes-list" id="nodes-list"></div>
  </section>

  <aside class="detail-panel">
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-body" id="detail-body"></div>

    <div id="prompt-generator" style="display:none; padding:12px; border-top:1px solid var(--border);">
      <div style="font-size:12px; margin-bottom:6px;">Topic</div>
      <input id="topic-input" type="text" placeholder="e.g. World War II"
        style="width:100%; margin-bottom:10px; padding:6px;" />

      <div style="font-size:12px; margin-bottom:6px;">Year Level</div>
      <input id="year-input" type="text" placeholder="e.g. Year 10"
        style="width:100%; margin-bottom:10px; padding:6px;" />

      <div style="font-size:12px; margin-bottom:6px;">Inquiry Question (optional)</div>
      <input id="inquiry-input" type="text" placeholder="e.g. To what extent was WWII inevitable?"
        style="width:100%; margin-bottom:10px; padding:6px;" />

      <button id="generate-btn" style="margin-bottom:10px;">Generate Prompt</button>

      <div style="font-size:12px; margin-bottom:6px;">Prompt Output</div>
      <div style="position:relative;">
        <textarea id="prompt-output"
          style="width:100%; height:180px; padding-right:40px;"></textarea>
        <button id="copy-btn" style="
          position:absolute; top:6px; right:6px;
          border:none; background:transparent;
          cursor:pointer; font-size:16px;">📋</button>
      </div>

      <div style="font-size:12px; margin-top:12px; margin-bottom:6px;">Generated JSON</div>
      <textarea id="json-input"
        style="width:100%; height:220px; font-size:11px; margin-bottom:10px;"></textarea>

      <button id="load-map-btn">Load Map</button>
    </div>
  </aside>

</div>

<div class="footer-note">
  Minimal PoC for structured and interactive topic exploration using clusters, nodes, and content blocks.
</div>

<div id="timeline-tooltip" class="timeline-tooltip"></div>

<script type="module" src="./app.js"></script>

</body>
</html>
