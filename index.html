<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Learning Maps</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a1e;
    --surface: #242428;
    --surface2: #2e2e32;
    --text: #f0ede8;
    --muted: #9a9790;
    --border: rgba(255,255,255,0.08);
    --tooltip-bg: #111215;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }

  header .sub {
    font-size: 12px;
    color: var(--muted);
  }

  .main {
    display: grid;
    grid-template-columns: 20fr 35fr 45fr;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  .cluster-panel,
  .nodes-panel,
  .detail-panel {
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .cluster-panel { border-right: 1px solid var(--border); }
  .nodes-panel { border-right: 1px solid var(--border); }

  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-kicker {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .panel-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 16px;
    line-height: 1.25;
  }

  .panel-subtitle {
    margin-top: 6px;
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--muted);
  }

  .cluster-list,
  .nodes-list,
  .detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }

  .cluster-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cluster-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
  }

  .cluster-card:hover {
    background: rgba(255,255,255,0.03);
    transform: translateY(-1px);
  }

  .cluster-card.active {
    background: rgba(255,255,255,0.045);
  }

  .cluster-badge,
  .detail-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    margin-bottom: 7px;
  }

  .cluster-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 15px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .cluster-desc {
    font-size: 11px;
    line-height: 1.65;
    color: var(--muted);
  }

  .nodes-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    grid-auto-rows: min-content;
    gap: 10px;
    align-content: start;
  }

  .node-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
  }

  .node-card:hover {
    background: rgba(255,255,255,0.03);
    transform: translateY(-1px);
  }

  .node-card.active {
    background: rgba(255,255,255,0.055);
  }

  .node-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 3px;
  }

  .node-subtitle {
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .node-divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0 8px;
  }

  .node-desc {
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
  }

  .detail-header {
    padding: 18px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .detail-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 18px;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .detail-subtitle {
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.45;
  }

  .detail-section {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 18px;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .detail-text {
    font-size: 12px;
    line-height: 1.75;
    color: var(--text);
  }

  .detail-muted {
    font-size: 12px;
    line-height: 1.75;
    color: var(--muted);
  }

  .overview-box {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .overview-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .overview-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }

  .overview-quote {
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 10px;
  }

  .overview-text {
    font-size: 12px;
    line-height: 1.7;
    color: var(--muted);
  }

  .content-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .content-block + .content-block {
    margin-top: 10px;
  }

  .content-image {
    width: 100%;
    display: block;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: var(--surface2);
  }

  .content-caption {
    padding: 10px 12px;
    font-size: 11px;
    line-height: 1.55;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  .content-quote {
    padding: 14px 14px 12px;
  }

  .content-quote-text {
    font-size: 12px;
    line-height: 1.75;
    color: var(--text);
    font-style: italic;
    margin-bottom: 8px;
  }

  .content-quote-source {
    font-size: 11px;
    color: var(--muted);
  }

  .content-text {
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.75;
    color: var(--muted);
  }

  .timeline {
    padding: 10px 12px;
  }

  .timeline-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }

  .timeline-item {
    display: grid;
    grid-template-columns: 54px 1fr;
    gap: 10px;
    align-items: start;
    cursor: default;
  }

  .timeline-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0.8;
    padding-top: 2px;
  }

  .timeline-dotwrap {
    position: relative;
    padding-left: 14px;
  }

  .timeline-dotwrap::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 7px;
    bottom: -12px;
    width: 1px;
    background: var(--border);
  }

  .timeline-item:last-child .timeline-dotwrap::before {
    display: none;
  }

  .timeline-dotwrap::after {
    content: "";
    position: absolute;
    left: 0;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #b8b8b8;
  }

  .timeline-title {
    font-size: 11.5px;
    line-height: 1.45;
    color: var(--text);
  }

  .timeline-tooltip {
    position: fixed;
    max-width: 240px;
    background: var(--tooltip-bg);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 11px;
    line-height: 1.55;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    display: none;
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
  }

  .footer-note {
    flex-shrink: 0;
    padding: 7px 24px;
    font-size: 10.5px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  @media (max-width: 1200px) {
    .main {
      grid-template-columns: 18fr 34fr 48fr;
    }
  }

  @media (max-width: 980px) {
    body {
      overflow: auto;
    }

    .main {
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .cluster-panel,
    .nodes-panel,
    .detail-panel {
      min-height: 280px;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }

    .nodes-list {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<header>
  <h1 id="page-title">Learning Maps</h1>
  <div class="sub" id="page-subtitle"></div>
  <button id="open-prompt-btn">New Map</button>
</header>

<div class="main">
  <section class="cluster-panel">
    <div class="panel-header">
      <div class="panel-kicker">Clusters</div>
      <div class="panel-title">Topic Structure</div>
      <div class="panel-subtitle">Choose a cluster to narrow the topic into a more manageable area.</div>
    </div>
    <div class="cluster-list" id="cluster-list"></div>
  </section>

  <section class="nodes-panel">
    <div class="panel-header" id="nodes-header"></div>
    <div class="nodes-list" id="nodes-list"></div>
  </section>

  <aside class="detail-panel">
    <div class="detail-header" id="detail-header"></div>
    <div class="detail-body" id="detail-body">
    </div>
    
    <div id="prompt-generator" style="display:none; padding:12px; border-top:1px solid var(--border);">
        <div style="font-size:12px; margin-bottom:6px;">Topic</div>
        <input id="topic-input" type="text" placeholder="e.g. World War II"
            style="width:100%; margin-bottom:10px; padding:6px;" />

        <div style="font-size:12px; margin-bottom:6px;">Year Level</div>
        <input id="year-input" type="text" placeholder="e.g. Year 10"
            style="width:100%; margin-bottom:10px; padding:6px;" />

        <button id="generate-btn" style="margin-bottom:10px;">Generate Prompt</button>

        <div style="font-size:12px; margin-bottom:6px;">Prompt Output</div>
        <textarea id="prompt-output"
            style="width:100%; height:180px; font-size:11px; margin-bottom:12px;"></textarea>

        <div style="font-size:12px; margin-bottom:6px;">Generated JSON</div>
        <textarea id="json-input"
            style="width:100%; height:220px; font-size:11px; margin-bottom:10px;"></textarea>

        <button id="load-map-btn">Load Map</button>
    </div>
  </aside>
</div>

<div class="footer-note">
  Minimal PoC for structured topic decomposition using Learning Maps.
</div>

<div id="timeline-tooltip" class="timeline-tooltip"></div>

<script>
const DATA_URL = './ww2_learning_map.json';

let mapData = null;
let selectedClusterId = null;
let selectedNodeIndex = null;

let schema = null;

fetch('./learning_map_schema.json')
  .then(r => r.json())
  .then(data => {
    schema = data;
    setupUI();
  });

fetch(DATA_URL)
  .then(r => r.json())
  .then(data => {
    mapData = data;
    initialise();
  })
  .catch(err => {
    console.error(err);
    document.getElementById('detail-header').innerHTML = `
      <div class="detail-title">Could not load data</div>
      <div class="detail-subtitle">Check the JSON filename and file location.</div>
    `;
  });

function hidePromptGenerator() {
  document.getElementById('prompt-generator').style.display = 'none';
}

function setupUI() {
    document.getElementById('generate-btn').addEventListener('click', () => {
  const topic = document.getElementById('topic-input').value;
  const year = document.getElementById('year-input').value;

  const prompt = generatePrompt({ topic, yearLevel: year });
  document.getElementById('prompt-output').value = prompt;
});

document.getElementById('open-prompt-btn').addEventListener('click', () => {
  const panel = document.getElementById('prompt-generator');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('load-map-btn').addEventListener('click', () => {
  const raw = document.getElementById('json-input').value;

  try {
    const parsed = JSON.parse(raw);
    mapData = parsed;
    selectedClusterId = null;
    selectedNodeIndex = null;
    initialise();

    document.getElementById('prompt-generator').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    alert('Invalid JSON. Check formatting and try again.');
    console.error(err);
  }
});
}

function initialise() {
  document.getElementById('page-title').textContent = mapData.title || 'Learning Maps';
  document.getElementById('page-subtitle').textContent = mapData.subtitle || '';

  renderClusters();
  renderOverviewState();
}

function renderClusters() {
  const list = document.getElementById('cluster-list');
  list.innerHTML = '';

  (mapData.clusters || []).forEach(cluster => {
    const badgeBg = hexToRgba(cluster.color || '#666666', 0.2);
    const badgeBorder = hexToRgba(cluster.color || '#666666', 0.4);

    const card = document.createElement('article');
    card.className = 'cluster-card';
    card.dataset.clusterId = cluster.id;
    card.style.borderColor = hexToRgba(cluster.color || '#666666', 0.32);

    card.innerHTML = `
      <div class="cluster-badge" style="background:${badgeBg}; color:${cluster.light || '#fff'}; border:1px solid ${badgeBorder};">
        CLUSTER
      </div>
      <div class="cluster-title" style="color:${cluster.light || '#fff'}">${cluster.title}</div>
      <div class="cluster-desc">${cluster.description || ''}</div>
    `;

    card.addEventListener('click', () => {
      hidePromptGenerator(); 
      selectedClusterId = cluster.id;
      selectedNodeIndex = null;
      updateActiveClusterCards();
      renderSelectedCluster();
      renderClusterDetail(cluster);
    });

    list.appendChild(card);
  });
}

function updateActiveClusterCards() {
  document.querySelectorAll('.cluster-card').forEach(card => {
    card.classList.toggle('active', card.dataset.clusterId === selectedClusterId);
  });
}

function updateActiveNodeCards() {
  document.querySelectorAll('.node-card').forEach(card => {
    const isActive =
      card.dataset.clusterId === selectedClusterId &&
      Number(card.dataset.nodeIndex) === selectedNodeIndex;
    card.classList.toggle('active', isActive);
  });
}

function renderOverviewState() {
  selectedClusterId = null;
  selectedNodeIndex = null;
  updateActiveClusterCards();
  renderNodesOverview();
  renderOverviewDetail();
}

function renderNodesOverview() {
  document.getElementById('nodes-header').innerHTML = `
    <div class="panel-kicker">Overview</div>
    <div class="panel-title">${mapData.overview?.title || mapData.title}</div>
    <div class="panel-subtitle">${mapData.overview?.description || ''}</div>
  `;

  const nodesList = document.getElementById('nodes-list');
  nodesList.innerHTML = '';

  (mapData.clusters || []).forEach(cluster => {
    const card = document.createElement('article');
    card.className = 'node-card';
    card.style.borderColor = hexToRgba(cluster.color || '#666666', 0.28);
    card.innerHTML = `
      <div class="node-title" style="color:${cluster.light || '#fff'}">${cluster.title}</div>
      <div class="node-subtitle">cluster overview</div>
      <div class="node-divider"></div>
      <div class="node-desc">${cluster.description || ''}</div>
    `;
    card.addEventListener('click', () => {
      hidePromptGenerator(); 
      selectedClusterId = cluster.id;
      selectedNodeIndex = null;
      updateActiveClusterCards();
      renderSelectedCluster();
      renderClusterDetail(cluster);
    });
    nodesList.appendChild(card);
  });
}

function renderSelectedCluster() {
  const cluster = getSelectedCluster();
  const nodesHeader = document.getElementById('nodes-header');
  const nodesList = document.getElementById('nodes-list');

  if (!cluster) {
    renderNodesOverview();
    return;
  }

  nodesHeader.innerHTML = `
    <div class="panel-kicker">Selected Cluster</div>
    <div class="panel-title">${cluster.title}</div>
    <div class="panel-subtitle">${cluster.description || ''}</div>
  `;

  nodesList.innerHTML = '';

  (cluster.nodes || []).forEach((node, index) => {
    const card = document.createElement('article');
    card.className = 'node-card';
    card.dataset.clusterId = cluster.id;
    card.dataset.nodeIndex = index;
    card.style.borderColor = hexToRgba(cluster.color || '#666666', 0.32);

    card.innerHTML = `
      <div class="node-title" style="color:${cluster.light || '#fff'}">${node.title}</div>
      <div class="node-subtitle">${node.subtitle || ''}</div>
      <div class="node-divider"></div>
      <div class="node-desc">${node.description || ''}</div>
    `;

    card.addEventListener('click', () => {
      hidePromptGenerator(); 
      selectedNodeIndex = index;
      updateActiveNodeCards();
      renderNodeDetail(cluster, node);
    });

    nodesList.appendChild(card);
  });

  updateActiveNodeCards();
}

function renderOverviewDetail() {
  document.getElementById('detail-header').innerHTML = `
    <div class="detail-title">${mapData.overview?.title || mapData.title}</div>
    <div class="detail-subtitle">${mapData.overview?.description || ''}</div>
  `;

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  const box = document.createElement('div');
  box.className = 'overview-box';

  (mapData.overview?.sections || []).forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'overview-section';

    if (section.title) {
      const title = document.createElement('div');
      title.className = 'overview-title';
      title.textContent = section.title;
      sec.appendChild(title);
    }

    if (section.quote) {
      const quote = document.createElement('div');
      quote.className = 'overview-quote';
      quote.textContent = section.quote;
      sec.appendChild(quote);
    }

    if (section.text) {
      const text = document.createElement('div');
      text.className = 'overview-text';
      text.textContent = section.text;
      sec.appendChild(text);
    }

    box.appendChild(sec);
  });

  body.appendChild(box);
}

function renderClusterDetail(cluster) {
  const badgeBg = hexToRgba(cluster.color || '#666666', 0.2);
  const badgeBorder = hexToRgba(cluster.color || '#666666', 0.4);

  document.getElementById('detail-header').innerHTML = `
    <div class="detail-badge" style="background:${badgeBg}; color:${cluster.light || '#fff'}; border:1px solid ${badgeBorder};">
      Cluster
    </div>
    <div class="detail-title" style="color:${cluster.light || '#fff'}">${cluster.title}</div>
    <div class="detail-subtitle">${cluster.description || ''}</div>
  `;

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="detail-section">
      <div class="detail-label">Focus</div>
      <div class="detail-text">${cluster.description || ''}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Included nodes</div>
      <div class="detail-muted">${(cluster.nodes || []).map(n => n.title).join(' • ')}</div>
    </div>
  `;
}

function renderNodeDetail(cluster, node) {
  const badgeBg = hexToRgba(cluster.color || '#666666', 0.2);
  const badgeBorder = hexToRgba(cluster.color || '#666666', 0.4);

  document.getElementById('detail-header').innerHTML = `
    <div class="detail-badge" style="background:${badgeBg}; color:${cluster.light || '#fff'}; border:1px solid ${badgeBorder};">
      ${cluster.title}
    </div>
    <div class="detail-title" style="color:${cluster.light || '#fff'}">${node.title}</div>
    <div class="detail-subtitle">${node.subtitle || ''}</div>
  `;

  const body = document.getElementById('detail-body');
  body.innerHTML = '';

  body.appendChild(makeSection('Description', node.description || '', false));

  if (node.content && node.content.length) {
    const contentSection = document.createElement('div');
    contentSection.className = 'detail-section';

    const label = document.createElement('div');
    label.className = 'detail-label';
    label.textContent = 'Content';
    contentSection.appendChild(label);

    const wrap = document.createElement('div');
    node.content.forEach(block => {
      wrap.appendChild(renderContentBlock(block));
    });

    contentSection.appendChild(wrap);
    body.appendChild(contentSection);
  }

  if (node.significance) {
    body.appendChild(makeSection('Why this matters', node.significance, true));
  }

  body.appendChild(makeSection('Cluster context', cluster.description || '', true));
}

function renderContentBlock(block) {
  const el = document.createElement('div');
  el.className = 'content-block';

  if (block.type === 'image') {
    el.innerHTML = `
      <img class="content-image" src="${block.src || ''}" alt="${escapeHtml(block.caption || '')}">
      ${block.caption ? `<div class="content-caption">${block.caption}</div>` : ''}
    `;
    return el;
  }

  if (block.type === 'quote') {
    el.innerHTML = `
      <div class="content-quote">
        <div class="content-quote-text">“${block.text || ''}”</div>
        ${block.source ? `<div class="content-quote-source">${block.source}</div>` : ''}
      </div>
    `;
    return el;
  }

  if (block.type === 'text') {
    el.innerHTML = `<div class="content-text">${block.text || ''}</div>`;
    return el;
  }

  if (block.type === 'timeline') {
    return renderTimelineSVG(block);
  }

  el.innerHTML = `<div class="content-text">Unsupported content block type.</div>`;
  return el;
}

function renderTimelineSVG(block) {
  const padding = 40;
  const spacing = 120;
  const height = 100;
  const y = height / 2;

  const totalWidth = padding * 2 + (block.items.length - 1) * spacing;

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${totalWidth} ${height}`);
  svg.style.width = "100%";
  svg.style.height = height + "px";

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", padding);
  line.setAttribute("y1", y);
  line.setAttribute("x2", totalWidth - padding);
  line.setAttribute("y2", y);
  line.setAttribute("stroke", "#888");
  line.setAttribute("stroke-width", "1");
  svg.appendChild(line);

  block.items.forEach((item, i) => {
    const x = padding + i * spacing;

    const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
    group.style.cursor = "default";

    group.addEventListener("mouseenter", e => showTimelineTooltip(e, item.text));
    group.addEventListener("mousemove", moveTimelineTooltip);
    group.addEventListener("mouseleave", hideTimelineTooltip);

    // invisible hover area
    const hit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    hit.setAttribute("x", x - 38);
    hit.setAttribute("y", y - 28);
    hit.setAttribute("width", 76);
    hit.setAttribute("height", 56);
    hit.setAttribute("fill", "transparent");
    group.appendChild(hit);

    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", x);
    dot.setAttribute("cy", y);
    dot.setAttribute("r", 5);
    dot.setAttribute("fill", "#ccc");
    group.appendChild(dot);

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", x);
    label.setAttribute("y", y - 14);
    label.setAttribute("text-anchor", "middle");
    label.setAttribute("font-size", "10");
    label.setAttribute("fill", "#aaa");
    label.textContent = item.label;
    group.appendChild(label);

    const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
    title.setAttribute("x", x);
    title.setAttribute("y", y + 20);
    title.setAttribute("text-anchor", "middle");
    title.setAttribute("font-size", "11");
    title.setAttribute("fill", "#ddd");
    title.textContent = item.title;
    group.appendChild(title);

    svg.appendChild(group);
  });

  const wrapper = document.createElement("div");
  wrapper.className = "content-block";
  wrapper.style.overflowX = "auto";
  wrapper.appendChild(svg);

  return wrapper;
}

function showTimelineTooltip(event, text) {
  const tip = document.getElementById('timeline-tooltip');
  if (!text) return;
  tip.textContent = text;
  tip.style.display = 'block';
  moveTimelineTooltip(event);
}

function moveTimelineTooltip(event) {
  const tip = document.getElementById('timeline-tooltip');
  if (tip.style.display !== 'block') return;

  const offset = 14;
  let left = event.clientX + offset;
  let top = event.clientY + offset;

  const rect = tip.getBoundingClientRect();
  if (left + rect.width > window.innerWidth - 8) {
    left = event.clientX - rect.width - offset;
  }
  if (top + rect.height > window.innerHeight - 8) {
    top = event.clientY - rect.height - offset;
  }

  tip.style.left = `${left}px`;
  tip.style.top = `${top}px`;
}

function hideTimelineTooltip() {
  const tip = document.getElementById('timeline-tooltip');
  tip.style.display = 'none';
}

function makeSection(labelText, contentText, muted = false) {
  const section = document.createElement('div');
  section.className = 'detail-section';

  const label = document.createElement('div');
  label.className = 'detail-label';
  label.textContent = labelText;

  const content = document.createElement('div');
  content.className = muted ? 'detail-muted' : 'detail-text';
  content.textContent = contentText;

  section.appendChild(label);
  section.appendChild(content);
  return section;
}

function getSelectedCluster() {
  return (mapData.clusters || []).find(c => c.id === selectedClusterId) || null;
}

function hexToRgba(hex, alpha) {
  const clean = hex.replace('#', '');
  const bigint = parseInt(clean, 16);
  const r = (bigint >> 16) & 255;
  const g = (bigint >> 8) & 255;
  const b = bigint & 255;
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('"', '&quot;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

function generatePrompt({ topic, yearLevel }) {
 if (!schema) return "Schema not loaded yet.";

  return `
You are generating a structured Learning Map.

Topic: ${topic}
Audience: ${yearLevel}

Follow this JSON schema exactly:
${JSON.stringify(schema, null, 2)}

Rules:
- Output valid JSON only
- Do not include explanations
- Use only these content block types: image, quote, text, timeline
- 4–6 clusters
- 3–4 nodes per cluster
- Keep descriptions concise
- Use timelines only when helpful

Return only the JSON object.
`;
}
